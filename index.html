<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Display Sensore SIM800L</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #fafafa; }
        .box { border: 2px solid #333; display: inline-block; padding: 40px; border-radius: 8px; background: white; }
        .dato { font-size: 64px; color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Dato Sensore in Tempo Reale</h2>
        <div id="display-sensore" class="dato">---</div>
        <p id="info">In attesa di dati...</p>
    </div>

    <script>
        // Incolla lo stesso identico URL del tuo Cloudflare Worker
        const URL_WORKER = "https://workers.dev";

        function scaricaDatoDallESP32() {
            fetch(URL_WORKER)
                .then(response => response.json())
                .then(data => {
                    if (data && data.valore !== undefined) {
                        document.getElementById("display-sensore").innerText = data.valore;
                        document.getElementById("info").innerText = "Ultimo agg: " + new Date().toLocaleTimeString();
                    }
                })
                .catch(err => {
                    console.error("Errore:", err);
                    document.getElementById("info").innerText = "Errore di connessione al bridge web.";
                });
        }

        // Chiede il dato al serverless worker ogni 5 secondi
        setInterval(scaricaDatoDallESP32, 5000);
        scaricaDatoDallESP32(); // Esecuzione immediata al caricamento
    </script>
</body>
</html>
