    <script>
        // Incolla lo stesso identico URL del tuo Cloudflare Worker
        const URL_WORKER = "https://rapid-tree-f68b.angelofraioli.workers.dev";

        function scaricaDatoDallESP32() {
            fetch(URL_WORKER)
                .then(response => response.json())
                .then(data => {
                    if (data && data.valore !== undefined) {
                        document.getElementById("display-sensore").innerText = data.valore;
                        document.getElementById("info").innerText = "Ultimo agg: " + new Date().toLocaleTimeString();
                    }
                })
                .catch(err => {
                    console.error("Errore:", err);
                    document.getElementById("info").innerText = "Errore di connessione al bridge web.";
                });
        }

        // Chiede il dato al serverless worker ogni 5 secondi
        setInterval(scaricaDatoDallESP32, 5000);
        scaricaDatoDallESP32(); // Esecuzione immediata al caricamento
    </script>
</body>
